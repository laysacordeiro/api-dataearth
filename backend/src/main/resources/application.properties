spring.config.import=optional:file:.env[.properties]
spring.application.name=starting-mysql-with-spring-boot

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/dataearth_realdatatype12?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Evita conflitos com SQL init (só se usa Flyway)
spring.sql.init.mode=never

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Servidor
server.port=8080
server.address=0.0.0.0

# Logging para debug
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.springframework.jdbc=DEBUG

debug=true

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=dataearthapi@gmail.com
spring.mail.password=pbdtyhdrterdujss
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false

# Admin e-mail que recebera as solicitacoes
app.admin.email=icarodejesussilva3@gmail.com
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=/tmp/schema.sql

app.jwt.secret=cdc170b326230aeab1ca50fcfe404a49304831efe18696f2163a76ebef39bdca
app.jwt.expiration=86400000

