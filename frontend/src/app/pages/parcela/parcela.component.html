<app-layout>
    <div class="content">

        <div class="card">
            <div class="card-header">
                <h2>Lista de Parcelas</h2>
                <div class="spaceflex">
                    <button mat-raised-button class="btn-nova" *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')" (click)="abrirCadastroParcela()">
                        Nova Parcela
                    </button>
                </div>
            </div>

            <div class="filtros-bar" style="margin-bottom: 20px; margin-top: 15px;">
                <!-- Pesquisa -->
                <div class="search-bar">
                    <input type="text" placeholder="Pesquisar proprietário..." [(ngModel)]="filtroProprietario"
                        (ngModelChange)="aplicarFiltros()" />
                    <mat-icon>search</mat-icon>
                </div>
            </div>

            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> ID </th>
                    <td mat-cell *matCellDef="let p"> {{ p.id }} </td>
                </ng-container>

                <ng-container matColumnDef="proprietario">
                    <th mat-header-cell *matHeaderCellDef> Proprietário </th>
                    <td mat-cell *matCellDef="let p"> {{ p.proprietario }} </td>
                </ng-container>

                <ng-container matColumnDef="usoDaTerra">
                    <th mat-header-cell *matHeaderCellDef> Uso da Terra </th>
                    <td mat-cell *matCellDef="let p"> {{ p.usoDaTerra }} </td>
                </ng-container>

                <ng-container matColumnDef="data">
                    <th mat-header-cell *matHeaderCellDef> Data do Evento </th>
                    <td mat-cell *matCellDef="let p"> {{ formatarData(p) }} </td>
                </ng-container>

                <ng-container matColumnDef="acoes">
                    <th mat-header-cell *matHeaderCellDef> Ações </th>
                    <td mat-cell *matCellDef="let p" class="acoes-cell">
                        <button mat-icon-button color="primary" matTooltip="Detalhes">
                            <mat-icon>account_tree</mat-icon>
                        </button>

                        <button mat-icon-button color="accent" matTooltip="Editar" *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')">
                            <mat-icon>edit</mat-icon>
                        </button>

                        <button mat-icon-button color="warn" matTooltip="Excluir" *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')" (click)="excluirParcela(p)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <div class="pagination">
                <span>Itens por página:</span>
                <select [(ngModel)]="itensPorPagina" (change)="alterarItensPorPagina()">
                    <option *ngFor="let qtd of [5,10,20]" [value]="qtd">{{ qtd }}</option>
                </select>
                <span>{{ dataSource.filteredData.length }} total</span>
            </div>

            <mat-paginator #paginator [pageSize]="itensPorPagina" [pageSizeOptions]="[5,10,20]" style="display:none">
            </mat-paginator>

        </div>

        <router-outlet></router-outlet>
    </div>
</app-layout>
