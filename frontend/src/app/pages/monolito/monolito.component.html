<app-layout>
  <div class="content">

    <div class="card">
      <div class="card-header">
        <h2>Lista de Monólitos</h2>
        <div class="spaceflex">
          <button mat-raised-button class="btn-nova"
            *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')"
            (click)="abrirCadastroMonolito()">
            Novo Monólito
          </button>
        </div>
      </div>

      <div class="filtros-bar">
        <!-- Pesquisa -->
        <div class="search-bar">
          <input type="text" placeholder="Pesquisar station field number..." [(ngModel)]="filtroStationFieldNumber"
            (ngModelChange)="aplicarFiltros()" />
          <mat-icon>search</mat-icon>
        </div>

        <!-- Espécie -->
        <button class="filtro-pill" mat-button [matMenuTriggerFor]="menuEspecie">
          Espécie
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #menuEspecie="matMenu" class="menu-filtro">
          <div class="menu-opcoes" (click)="$event.stopPropagation()">
            <h4>Espécie</h4>

            <button class="opcao-filtro" [class.ativo]="filtroEspecie === ''" (click)="limparFiltroEspecie()">
              Todas
            </button>

            <button class="opcao-filtro" *ngFor="let especie of especies" [class.ativo]="filtroEspecie === especie.nome"
              (click)="selecionarEspecie(especie.nome)">
              {{ especie.nome }}
            </button>
          </div>
        </mat-menu>

        <!-- Método -->
        <button class="filtro-pill" mat-button [matMenuTriggerFor]="menuMetodo">
          Método
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #menuMetodo="matMenu" class="menu-filtro">
          <div class="menu-opcoes" (click)="$event.stopPropagation()">
            <h4>Método</h4>

            <button class="opcao-filtro" [class.ativo]="filtroMetodo === ''" (click)="limparFiltroMetodo()">
              Todos
            </button>

            <button class="opcao-filtro" *ngFor="let metodo of metodos" [class.ativo]="filtroMetodo === metodo"
              (click)="selecionarMetodo(metodo)">
              {{ metodo }}
            </button>
          </div>
        </mat-menu>

        <!-- Data -->
        <button class="filtro-pill" mat-button [matMenuTriggerFor]="menuData">
          Data
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #menuData="matMenu" class="menu-filtro">
          <div class="menu-content" (click)="$event.stopPropagation()">
            <label>Data inicial</label>
            <input type="date" [(ngModel)]="filtroDataInicio" (change)="aplicarFiltros()" />

            <label>Data final</label>
            <input type="date" [(ngModel)]="filtroDataFim" (change)="aplicarFiltros()" />
          </div>
        </mat-menu>

        <!-- Limpar -->
        <button class="filtro-pill limpar-btn" (click)="limparFiltros()">
          Limpar filtros
        </button>
      </div>

      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <ng-container matColumnDef="stationFieldNumber">
          <th mat-header-cell *matHeaderCellDef> Station Field Number </th>
          <td mat-cell *matCellDef="let m"> {{ m.stationFieldNumber }} </td>
        </ng-container>

        <ng-container matColumnDef="profundidadeSolo">
          <th mat-header-cell *matHeaderCellDef> Profundidade </th>
          <td mat-cell *matCellDef="let m"> {{ m.profundidadeSolo }} </td>
        </ng-container>

        <ng-container matColumnDef="collector">
          <th mat-header-cell *matHeaderCellDef> Coletor </th>
          <td mat-cell *matCellDef="let m"> {{ m.collector }} </td>
        </ng-container>

        <ng-container matColumnDef="dataColeta">
          <th mat-header-cell *matHeaderCellDef> Data </th>
          <td mat-cell *matCellDef="let m"> {{ formatarData(m) }} </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> </th>
          <td mat-cell *matCellDef="let m" class="acoes-cell">
            <button mat-icon-button color="primary" matTooltip="Visualizar" (click)="verMonolito(m)">
              <mat-icon>account_tree</mat-icon>
            </button>

            <button mat-icon-button color="accent" matTooltip="Editar"
              *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" matTooltip="Excluir"
              *ngIf="authService.hasRole('ROLE_ADMIN') || authService.hasRole('ROLE_RESC')"
              (click)="excluirMonolito(m)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="pagination">
        <span>Itens por página:</span>
        <select [(ngModel)]="itensPorPagina" (change)="alterarItensPorPagina()">
          <option *ngFor="let qtd of [5,10,20]" [value]="qtd">{{ qtd }}</option>
        </select>
        <span>{{ dataSource.filteredData.length }} total</span>
      </div>

      <mat-paginator #paginator [pageSize]="itensPorPagina" [pageSizeOptions]="[5,10,20]" style="display:none">
      </mat-paginator>
    </div>

    <router-outlet></router-outlet>
  </div>
</app-layout>
